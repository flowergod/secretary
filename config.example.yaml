# 项目管理 AI 助理 配置文件示例
# 复制此文件为 config.yaml 并填写实际值

feishu:
  appId: "cli_xxxxxxxxxxxxxxxx"
  appSecret: "your_app_secret_here"
  tableToken: "your_table_token_here"
  tableId: "your_table_id_here"
  webhookUrl: "https://open.feishu.cn/open-apis/bot/v2/hook/xxxxx"

icloud:
  appleId: "your@email.com"
  appPassword: "xxxx-xxxx-xxxx-xxxx"

ai:
  primary:
    provider: "volcano"
    apiKey: "${VOLCANO_API_KEY}"
    model: "coding-plan"
    baseUrl: "https://ark.cn-beijing.volces.com/api/v3"
  fallback:
    provider: "minimax"
    apiKey: "${MINIMAX_API_KEY}"
    baseUrl: "https://api.minimax.io/anthropic"
    model: "MiniMax-Text-01"

reminders:
  morning:
    enabled: true
    time: "8:30"
  evening:
    enabled: true
    time: "21:00"
  weekendSummary:
    enabled: true
    time: "18:00"
    dayOfWeek: 5
  preEvent:
    enabled: true
    minutesBefore: 15
  idleTime:
    enabled: true
    minFreeMinutes: 60